<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FantasyNow+ | Content & Tools Hub</title>
    <style>
        body { margin: 0; padding-top: 120px; background-color: #0a0f1a; font-family: sans-serif; }
        
        /* Fixed Header */
        header { position: fixed; top: 0; width: 100%; height: 80px; background: #0a0f1a; border-bottom: 1px solid #2d3748; display: flex; align-items: center; padding: 0 40px; }
        .logo img { height: 40px; }

        /* Ticker Container */
        .ticker-wrap {
            position: fixed;
            top: 80px;
            width: 100%;
            height: 40px;
            background: #05142e;
            overflow: hidden;
            border-bottom: 1px solid #FFA515;
            z-index: 99;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: ticker 60s linear infinite;
        }

        .ticker-wrap:hover .ticker-move { animation-play-state: paused; }

        @keyframes ticker {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .ticker-move a { color: #FFA515; text-decoration: none; margin: 0 30px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><img src="fantasy_logo-3.png" alt="Logo"></a>
    </header>

    <div class="ticker-wrap">
        <div class="ticker-move" id="news-container">
            Fetching latest updates...
        </div>
    </div>

    <script src="news-ticker.js"></script>
</body>
</html>
