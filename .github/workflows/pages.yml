name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A54A07: ${{ secrets.A54A07 }}
          B6FC5D: ${{ secrets.B6FC5D }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('A54A07', '')
          sec_b = os.environ.get('B6FC5D', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 491cac56f5e64dc510add7cfd2a4d8322d6409 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 28032931b14ec39872f2d353716d50 -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
